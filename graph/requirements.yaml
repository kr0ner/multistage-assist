  test_files: [tests/test_multi_command_blocking.py]
  status: implemented

REQ-PIPE-009:
  category: pipeline
  title: "Stage 2 — Local LLM Intent Parsing"
  description: "Uses Ollama LLM for intent, domain, slot extraction. Multi-turn for Timer/Calendar/Vacuum."
  source_files: [stage2_llm.py]
  test_files: []
