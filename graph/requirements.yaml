# MultiStage Assist — Requirements (structured data)
#
# Machine-readable requirements loaded into the code graph.
# Each requirement has: category, title, description, source_files, test_files, status.
# The graph builder cross-references these with actual code nodes and test edges.

# =============================================================================
# Pipeline Architecture
# =============================================================================
REQ-PIPE-001:
  category: pipeline
  title: "4-Stage Escalation"
  description: "Sequential escalation through Stage 0 (NLU) → 1 (cache) → 2 (local LLM) → 3 (cloud LLM). Each returns StageResult with 6 statuses."
  source_files: [conversation.py, stage_result.py]
  test_files: [tests/test_conversation.py]
  status: implemented

REQ-PIPE-002:
  category: pipeline
  title: "Minimalist Escalate Philosophy"
  description: "Prefer cheapest/fastest path. Escalate only when unable to resolve with sufficient certainty."
  source_files: []
  test_files: []
  status: implemented

REQ-PIPE-003:
  category: pipeline
  title: "Stage 0 — HA Built-in NLU"
  description: "Uses hassil recognize_best(). No LLM. Escalates on no match or >10 candidates."
  source_files: [stage0.py]
  test_files: [tests/test_nlu_passthrough.py]
  status: implemented

REQ-PIPE-004:
  category: pipeline
  title: "Stage 0 Dry-run Recognition"
  description: "Dry-run NLU recognition without executing intent. Returns normalized entities dict."
  source_files: [stage0.py]
  test_files: [tests/test_nlu_passthrough.py]
  status: implemented

REQ-PIPE-005:
  category: pipeline
  title: "Stage 1 — Semantic Cache Lookup"
  description: "3-tier lookup: anchor check → local fuzzy → remote add-on fallback."
  source_files: [stage1_cache.py, capabilities/semantic_cache.py]
  test_files: [tests/test_semantic_cache.py, tests/test_stage1_fallback_fix.py]
  status: implemented

REQ-PIPE-006:
  category: pipeline
  title: "Stage 1 Preprocessing"
  description: "Runs ImplicitIntentCapability + AtomicCommandCapability before cache lookup."
  source_files: [stage1_cache.py]
  test_files: [tests/test_cache_skip_logic.py]
  status: implemented

REQ-PIPE-007:
  category: pipeline
  title: "Stage 1 Cache Bypass Intents"
  description: "CACHE_BYPASS_INTENTS: HassTimerCancel. These always escalate to LLM."
  source_files: [stage1_cache.py]
  test_files: [tests/test_cache_skip_logic.py, tests/test_nlu_passthrough.py]
  status: implemented

REQ-PIPE-008:
